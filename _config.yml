title: MP Record
description: Every UK MP's official public records — voting history, financial interests, donations, and expenses — in one search.
collections:
  mps:
    output: true
    permalink: /mps/:name/
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "_mps"
    values:
      layout: mp
exclude:
  - scripts/
  - README.md
